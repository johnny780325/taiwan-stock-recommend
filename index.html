<!doctype html>
<html lang="zh-TW" style="background:#0a0a0f;color:#fff">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA / iOS Splash Screen 深色設定 -->
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="台股雷達" />

    <!-- iOS 啟動畫面背景色（splash screen） -->
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        background: #0a0a0f !important;
        min-height: 100%;
        color: #fff;
      }
      /* iOS PWA 啟動時的 body 背景 */
      body { background-color: #0a0a0f !important; }
    </style>

    <title>台股題材選股雷達</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- iOS PWA 啟動圖示（讓 splash screen 用深色底） -->
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- 強制讓 iOS Safari 用深色 splash -->
    <meta name="msapplication-navbutton-color" content="#0a0a0f" />
  </head>
  <body style="background:#0a0a0f;background-color:#0a0a0f">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
